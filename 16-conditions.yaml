- name: install and run nginx service 
  hosts: local
  connection: local
  tasks:
  - name: install nginx service 
    ansible.builtin.dnf:
      name: nginx
      state: installed
    when: ansible_os_family == "RedHat"
  
  - name: install nginx 
    ansible.builtin.apt:
      name: nginx
      state: installed 
    when: ansible_os_family == "Debain"